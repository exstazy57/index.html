<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mines Stars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; overflow: hidden; }
        #balance-card { background: #1e293b; padding: 15px; border-bottom: 2px solid #3b82f6; }
        #balance-val { font-size: 24px; font-weight: bold; color: #fbbf24; transition: all 0.3s; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; max-width: 350px; margin: 0 auto; }
        .cell { aspect-ratio: 1; background: #334155; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: none; }
        .cell.open { background: #475569; cursor: default; }
        .cell.star { background: #10b981; }
        .cell.bomb { background: #ef4444; }
        .controls { padding: 20px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 80px; margin-right: 10px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; }
        button:disabled { background: #64748b; }
        #cashout-btn { background: #10b981; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div id="balance-card">
    <div>ТВОЙ БАЛАНС</div>
    <div id="balance-val">Загрузка...</div>
</div>

<div class="grid" id="grid"></div>

<div class="controls">
    <input type="number" id="bet-input" value="10" min="1">
    <button id="start-btn" onclick="startGame()">ИГРАТЬ</button>
    <button id="cashout-btn" onclick="cashOut()">ЗАБРАТЬ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let balance = 0;
    let bet = 0;
    let mines = [];
    let revealed = 0;
    let gameActive = false;
    let currentMultiplier = 1;

    // --- ЛОГИКА СИНХРОНИЗАЦИИ ---

    async function loadInitialData() {
        return new Promise((resolve) => {
            // 1. Пытаемся получить баланс из Облака
            tg.CloudStorage.getItem('user_balance', (err, value) => {
                if (!err && value) {
                    balance = parseInt(value);
                    console.log("Баланс загружен из Облака:", balance);
                } else {
                    // 2. Если в облаке нет, берем из URL (первый вход)
                    const params = new URLSearchParams(window.location.search);
                    balance = parseInt(params.get('bal')) || 0;
                    console.log("Баланс взят из URL:", balance);
                }
                updateUI();
                resolve();
            });
        });
    }

    async function saveBalance() {
        updateUI();
        // Эффект "сохранения" (цифры чуть увеличиваются)
        const el = document.getElementById('balance-val');
        el.style.transform = "scale(1.1)";
        setTimeout(() => el.style.transform = "scale(1)", 200);

        // Сохраняем в Облако Telegram
        tg.CloudStorage.setItem('user_balance', balance.toString(), (err) => {
            if (err) console.error("Ошибка сохранения в Облако:", err);
        });
    }

    function updateUI() {
        document.getElementById('balance-val').innerText = balance + " ⭐";
    }

    // --- ЛОГИКА ИГРЫ ---

    function createGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('button');
            cell.className = 'cell';
            cell.dataset.index = i;
            cell.onclick = () => openCell(i);
            grid.appendChild(cell);
        }
    }

    async function startGame() {
        if (gameActive) return;
        
        const input = document.getElementById('bet-input');
        bet = parseInt(input.value);

        if (bet > balance || bet <= 0) {
            alert("Недостаточно звезд!");
            return;
        }

        // Списание
        balance -= bet;
        gameActive = true;
        revealed = 0;
        currentMultiplier = 1;
        
        // СИНХРОНИЗАЦИЯ после ставки
        await saveBalance();

        // Генерация мин (3 мины)
        mines = [];
        while(mines.length < 3) {
            let r = Math.floor(Math.random() * 25);
            if(!mines.includes(r)) mines.push(r);
        }

        createGrid();
        document.getElementById('start-btn').disabled = true;
        document.getElementById('cashout-btn').style.display = 'inline-block';
        document.getElementById('cashout-btn').innerText = `ЗАБРАТЬ`;
    }

    function openCell(idx) {
        if (!gameActive) return;
        const cells = document.getElementsByClassName('cell');
        const cell = cells[idx];
        if (cell.classList.contains('open')) return;

        if (mines.includes(idx)) {
            // ВЗРЫВ
            cell.classList.add('open', 'bomb');
            cell.innerText = '💣';
            gameOver(false);
        } else {
            // ЗВЕЗДА
            cell.classList.add('open', 'star');
            cell.innerText = '⭐';
            revealed++;
            currentMultiplier += 0.5; // Упрощенный множитель
            document.getElementById('cashout-btn').innerText = `ЗАБРАТЬ ${(bet * currentMultiplier).toFixed(0)}`;
            
            if (revealed === 22) cashOut();
        }
    }

    async function cashOut() {
        if (!gameActive) return;
        let win = Math.floor(bet * currentMultiplier);
        balance += win;
        
        // СИНХРОНИЗАЦИЯ после выигрыша
        await saveBalance();
        gameOver(true);
    }

    function gameOver(win) {
        gameActive = false;
        document.getElementById('start-btn').disabled = false;
        document.getElementById('cashout-btn').style.display = 'none';
        
        // Показываем все мины
        const cells = document.getElementsByClassName('cell');
        mines.forEach(m => {
            cells[m].classList.add('open', 'bomb');
            cells[m].innerText = '💣';
        });

        // Отправка данных в бот при закрытии (опционально, для кнопки "Выход")
        // tg.sendData(JSON.stringify({action: "sync_balance", final_balance: balance}));
    }

    // Инициализация при загрузке
    loadInitialData();
    createGrid();

</script>
</body>
</html>
