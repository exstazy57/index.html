<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVIATOR STARS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050505; font-family: 'Roboto'; color: white; overflow: hidden; touch-action: none; }
        .top-bar { display: flex; justify-content: space-between; padding: 15px; background: #1b1c1d; border-bottom: 2px solid #e11d48; }
        .balance-box { color: #fbbf24; font-size: 18px; font-weight: 900; }
        #game-area { height: 60vh; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #multiplier { font-size: 60px; font-weight: 900; color: white; z-index: 10; text-shadow: 0 0 20px rgba(225,29,72,0.5); }
        .plane { position: absolute; bottom: 50px; left: 50px; width: 80px; transition: transform 0.1s linear; z-index: 5; }
        .controls { padding: 20px; background: #1b1c1d; height: 30vh; display: flex; flex-direction: column; gap: 10px; }
        input { background: #000; border: 1px solid #333; color: white; padding: 15px; border-radius: 10px; font-size: 20px; text-align: center; }
        #main-btn { background: #10b981; border: none; color: white; padding: 20px; border-radius: 10px; font-size: 22px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        #main-btn.betting { background: #e11d48; }
        .exit-btn { text-align: center; color: #666; font-size: 12px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="color: #e11d48;">AVIATOR</div>
    <div class="balance-box">⭐ <span id="balance-val">0</span></div>
</div>

<div id="game-area">
    <div id="multiplier">1.00x</div>
    <img src="https://cdn-icons-png.flaticon.com/512/3122/3122330.png" class="plane" id="plane" style="filter: invert(1) sepia(1) saturate(5) hue-rotate(320deg);">
</div>

<div class="controls">
    <input type="number" id="bet-input" value="10">
    <button id="main-btn" onclick="handleAction()">СТАВКА</button>
    <div class="exit-btn" onclick="finalizeAndExit()">СОХРАНИТЬ И ВЫЙТИ</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let balance = 0;
    let currentBet = 0;
    let gameActive = false;
    let multiplier = 1.00;
    let interval;

    // --- СИНХРОНИЗАЦИЯ ---
    async function syncData() {
        return new Promise((resolve) => {
            tg.CloudStorage.getItem('user_balance', (err, value) => {
                if (!err && value) {
                    balance = parseInt(value);
                } else {
                    const params = new URLSearchParams(window.location.search);
                    balance = parseInt(params.get('bal')) || 0;
                }
                updateUI();
                resolve();
            });
        });
    }

    function saveBalance() {
        updateUI();
        tg.CloudStorage.setItem('user_balance', balance.toString());
    }

    function updateUI() {
        document.getElementById('balance-val').innerText = balance.toLocaleString();
    }

    // --- ЛОГИКА ---
    function handleAction() {
        const btn = document.getElementById('main-btn');
        if (!gameActive) {
            const input = document.getElementById('bet-input');
            currentBet = parseInt(input.value);
            if (currentBet > balance || currentBet < 1) return;

            balance -= currentBet;
            saveBalance(); // Списание
            
            gameActive = true;
            btn.innerText = "ЗАБРАТЬ";
            btn.classList.add('betting');
            startRound();
        } else {
            cashOut();
        }
    }

    function startRound() {
        multiplier = 1.00;
        const plane = document.getElementById('plane');
        const multDisplay = document.getElementById('multiplier');
        
        interval = setInterval(() => {
            multiplier += 0.01;
            multDisplay.innerText = multiplier.toFixed(2) + "x";
            
            // Анимация полета
            plane.style.transform = `translate(${multiplier * 10}px, -${multiplier * 15}px)`;

            // Вероятность взлета (улета)
            if (Math.random() < 0.005) {
                flyAway();
            }
        }, 100);
    }

    function cashOut() {
        clearInterval(interval);
        let win = Math.floor(currentBet * multiplier);
        balance += win;
        saveBalance(); // Начисление выигрыша
        resetGame("ВЫИГРЫШ: " + win);
    }

    function flyAway() {
        clearInterval(interval);
        resetGame("УЛЕТЕЛ!");
    }

    function resetGame(msg) {
        gameActive = false;
        const btn = document.getElementById('main-btn');
        btn.innerText = "СТАВКА";
        btn.classList.remove('betting');
        document.getElementById('multiplier').innerText = msg;
        document.getElementById('plane').style.transform = "translate(0,0)";
    }

    function finalizeAndExit() {
        tg.sendData(JSON.stringify({action: "sync_balance", final_balance: balance}));
    }

    syncData();
</script>
</body>
</html>
