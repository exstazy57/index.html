<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLINKO STARS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0a0a0c; font-family: 'Orbitron'; color: white; overflow: hidden; }
        canvas { display: block; margin: 0 auto; background: radial-gradient(circle, #1a1a2e 0%, #0a0a0c 100%); }
        #ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .header { padding: 15px; display: flex; justify-content: space-between; pointer-events: auto; background: rgba(0,0,0,0.5); }
        .balance { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; font-size: 18px; }
        .controls { position: fixed; bottom: 0; width: 100%; padding: 20px; box-sizing: border-box; background: #16161a; pointer-events: auto; border-top: 1px solid #333; }
        input { background: #000; border: 1px solid #00f2ff; color: white; padding: 10px; width: 80px; border-radius: 5px; text-align: center; }
        #drop-btn { background: linear-gradient(180deg, #00f2ff, #0077ff); color: #000; border: none; padding: 10px 30px; border-radius: 5px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; }
        .exit-link { display: block; text-align: center; margin-top: 10px; font-size: 10px; color: #444; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-overlay">
    <div class="header">
        <div style="color:#00f2ff">PLINKO</div>
        <div class="balance">⭐ <span id="balance-val">0</span></div>
    </div>
    <div class="controls">
        <div style="display:flex; justify-content:center; gap:10px; align-items:center;">
            <input type="number" id="bet-amount" value="10">
            <button id="drop-btn" onclick="dropBall()">СТАВКА</button>
        </div>
        <div class="exit-link" onclick="finalizeAndExit()">СОХРАНИТЬ И ВЫЙТИ</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let balance = 0;
    let balls = [];
    const pins = [];
    const buckets = [5, 2, 0.5, 0.2, 0.5, 2, 5];
    const rows = 8;

    // --- СИНХРОНИЗАЦИЯ ---
    async function syncData() {
        return new Promise((resolve) => {
            tg.CloudStorage.getItem('user_balance', (err, value) => {
                if (!err && value) {
                    balance = parseInt(value);
                } else {
                    const params = new URLSearchParams(window.location.search);
                    balance = parseInt(params.get('bal')) || 0;
                }
                updateUI();
                resolve();
            });
        });
    }

    function saveBalance() {
        updateUI();
        tg.CloudStorage.setItem('user_balance', balance.toString());
    }

    function updateUI() {
        document.getElementById('balance-val').innerText = balance.toLocaleString();
    }

    // --- ИГРОВАЯ ЛОГИКА ---
    function initPins() {
        const spacing = canvas.width / 8;
        for (let r = 2; r <= rows; r++) {
            for (let i = 0; i < r; i++) {
                pins.push({
                    x: canvas.width/2 - (r-1)*spacing/2 + i*spacing,
                    y: r * spacing * 0.8 + 50
                });
            }
        }
    }

    function dropBall() {
        const amount = parseInt(document.getElementById('bet-amount').value);
        if (amount > balance || amount < 1) return;

        balance -= amount;
        saveBalance(); // Сохраняем списание

        balls.push({
            x: canvas.width/2 + (Math.random()-0.5)*10,
            y: 30,
            vx: 0,
            vy: 0,
            bet: amount
        });
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Рисуем колышки
        ctx.fillStyle = "#444";
        pins.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
        });

        // Рисуем лунки
        const bWidth = canvas.width / buckets.length;
        buckets.forEach((m, i) => {
            ctx.fillStyle = m >= 1 ? "#00ff44" : "#ff4444";
            ctx.fillRect(i * bWidth + 2, canvas.height - 120, bWidth - 4, 30);
            ctx.fillStyle = "black";
            ctx.font = "10px Orbitron";
            ctx.fillText(m + "x", i * bWidth + bWidth/3, canvas.height - 100);
        });

        // Обновляем шарики
        for (let i = balls.length - 1; i >= 0; i--) {
            let b = balls[i];
            b.vy += 0.3;
            b.x += b.vx;
            b.y += b.vy;

            // Коллизии с пинами
            pins.forEach(p => {
                const dist = Math.hypot(b.x - p.x, b.y - p.y);
                if (dist < 8) {
                    b.vy *= -0.5;
                    b.vx += (b.x - p.x) * 0.2;
                }
            });

            // Рисуем шарик
            ctx.fillStyle = "#00f2ff";
            ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill();

            // Попадание в лунку
            if (b.y > canvas.height - 120) {
                let bucketIdx = Math.floor(b.x / bWidth);
                bucketIdx = Math.max(0, Math.min(bucketIdx, buckets.length - 1));
                
                let win = Math.floor(b.bet * buckets[bucketIdx]);
                balance += win;
                saveBalance(); // Сохраняем выигрыш
                balls.splice(i, 1);
            }
        }
        requestAnimationFrame(update);
    }

    function finalizeAndExit() {
        tg.sendData(JSON.stringify({action: "sync_balance", final_balance: balance}));
    }

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    syncData();
    initPins();
    update();
</script>
</body>
</html>
