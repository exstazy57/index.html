<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRA PLINKO PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0a0b10;
            --panel: #161b22;
            --accent: #ff0055;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            align-items: center; height: 100vh;
        }

        #game-wrapper {
            position: relative; width: 100%; max-width: 500px;
            height: 100%; display: flex; flex-direction: column;
        }

        .header {
            display: flex; justify-content: space-between; padding: 15px;
            font-weight: bold; font-size: 1.1rem; color: var(--primary);
            z-index: 10; background: rgba(0,0,0,0.2);
        }

        canvas { display: block; width: 100%; flex-grow: 1; touch-action: none; }

        .ui-panel {
            background: var(--panel); padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px 20px 0 0;
        }

        .controls { display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; gap: 8px; }
        
        input, select {
            flex: 1; background: #0a0b10; border: 1px solid #30363d;
            color: white; padding: 10px; border-radius: 8px; outline: none; font-size: 14px;
        }

        button {
            padding: 14px; border: none; border-radius: 10px;
            background: linear-gradient(45deg, var(--primary), #0066ff);
            color: white; font-weight: bold; cursor: pointer;
            text-transform: uppercase; font-size: 14px;
        }

        #multiplier-row {
            display: flex; justify-content: center; gap: 2px;
            padding: 5px 0; margin-bottom: 5px;
        }

        .slot {
            flex: 1; height: 22px; border-radius: 4px;
            font-size: 9px; display: flex; align-items: center;
            justify-content: center; font-weight: bold;
            background: #1c2128; border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="header">
        <div id="bal-display">💰 0</div>
        <div id="status">ULTRA PLINKO</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-panel">
        <div id="multiplier-row"></div>
        <div class="controls">
            <div class="row">
                <input type="number" id="bet-amount" value="10" min="1">
                <select id="difficulty">
                    <option value="low">Низкий риск</option>
                    <option value="mid" selected>Средний риск</option>
                    <option value="high">Высокий риск</option>
                </select>
            </div>
            <button id="drop-btn">Запустить шар</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    // ИЗМЕНЕНО: Баланс по умолчанию 0
    let balance = parseInt(urlParams.get('bal')) || 0;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const balDisplay = document.getElementById('bal-display');
    const dropBtn = document.getElementById('drop-btn');
    const multRow = document.getElementById('multiplier-row');

    // ГЕОМЕТРИЯ: Уменьшили ряды и увеличили проходы
    const ROWS = 9; 
    const PIN_RADIUS = 2; // Маленькие пины
    const BALL_RADIUS = 6; // Оптимальный шар
    const GRAVITY = 0.35;
    const BOUNCE = 0.45;
    const FRICTION = 0.99;

    const DIFF_SETTINGS = {
        low:  [2, 1.5, 1.1, 0.5, 1.1, 1.5, 2],
        mid:  [5, 2, 0.5, 0.2, 0.5, 2, 5],
        high: [20, 5, 0.2, 0.1, 0.2, 5, 20]
    };

    let pins = [];
    let balls = [];
    let multipliers = DIFF_SETTINGS.mid;

    function initGame() {
        resize();
        createPins();
        updateMultipliers();
        updateUI();
    }

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }

    function createPins() {
        pins = [];
        // Рассчитываем отступы так, чтобы проходы были широкими
        const spacingX = canvas.width / (ROWS + 1);
        const spacingY = (canvas.height * 0.7) / ROWS;

        for (let r = 2; r <= ROWS; r++) {
            for (let i = 0; i < r; i++) {
                const x = canvas.width / 2 + (i - (r - 1) / 2) * spacingX;
                const y = r * spacingY + 30;
                pins.push({ x, y });
            }
        }
    }

    function updateMultipliers() {
        multipliers = DIFF_SETTINGS[document.getElementById('difficulty').value];
        multRow.innerHTML = '';
        multipliers.forEach(m => {
            const div = document.createElement('div');
            div.className = 'slot';
            div.innerText = 'x' + m;
            div.style.color = 'white';
            div.style.backgroundColor = m >= 1 ? (m > 2 ? '#ffcc00' : '#2ea043') : '#ff4d4d';
            multRow.appendChild(div);
        });
    }

    document.getElementById('difficulty').onchange = updateMultipliers;

    class Ball {
        constructor(x, bet) {
            this.x = x; this.y = 10;
            this.vx = (Math.random() - 0.5) * 1.5;
            this.vy = 0;
            this.bet = bet;
            this.color = '#00f2ff';
        }

        update() {
            this.vy += GRAVITY;
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= FRICTION;

            pins.forEach(p => {
                const dx = this.x - p.x;
                const dy = this.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < BALL_RADIUS + PIN_RADIUS) {
                    const angle = Math.atan2(dy, dx);
                    // Отскок
                    const force = 1.8;
                    this.vx = Math.cos(angle) * force + (Math.random() - 0.5);
                    this.vy = Math.sin(angle) * force;
                    tg.HapticFeedback.impactOccurred('light');
                }
            });

            if (this.x < BALL_RADIUS) { this.x = BALL_RADIUS; this.vx *= -BOUNCE; }
            if (this.x > canvas.width - BALL_RADIUS) { this.x = canvas.width - BALL_RADIUS; this.vx *= -BOUNCE; }

            if (this.y > canvas.height - 30) {
                this.calculateWin();
                return false;
            }
            return true;
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10; ctx.shadowColor = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, BALL_RADIUS, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        calculateWin() {
            const sectionWidth = canvas.width / multipliers.length;
            const index = Math.min(Math.floor(this.x / sectionWidth), multipliers.length - 1);
            const m = multipliers[index];
            const win = Math.floor(this.bet * m);
            balance += win;
            updateUI();
            
            // СИНХРОНИЗАЦИЯ С БОТОМ
            tg.sendData(JSON.stringify({ action: "sync_balance", final_balance: balance }));
        }
    }

    dropBtn.onclick = () => {
        const bet = parseInt(document.getElementById('bet-amount').value);
        if (bet > balance || bet <= 0) return alert("Недостаточно баланса!");
        balance -= bet;
        updateUI();
        balls.push(new Ball(canvas.width / 2 + (Math.random() - 0.5) * 15, bet));
        tg.HapticFeedback.impactOccurred('medium');
    };

    function updateUI() {
        balDisplay.innerText = `💰 ${balance}`;
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        pins.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, PIN_RADIUS, 0, Math.PI * 2); ctx.fill();
        });
        balls = balls.filter(b => {
            const alive = b.update();
            if (alive) b.draw();
            return alive;
        });
        requestAnimationFrame(animate);
    }

    window.onresize = () => { resize(); createPins(); };
    initGame();
    animate();
</script>
</body>
</html>
