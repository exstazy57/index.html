<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLINKO AUTO-SYNC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0a0b10;
            --panel: #161b22;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        .header {
            display: flex; justify-content: space-between; padding: 15px;
            background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        #bal-display { color: var(--primary); font-weight: 900; font-size: 1.4rem; }

        canvas { flex-grow: 1; touch-action: none; width: 100%; }

        .ui-panel {
            background: var(--panel); padding: 20px;
            border-radius: 24px 24px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        
        input {
            background: #0d1117; border: 1px solid #30363d;
            color: white; padding: 12px; border-radius: 12px; text-align: center;
        }

        .btn-drop {
            background: linear-gradient(135deg, #00f2ff, #0066ff);
            color: white; border: none; padding: 16px; border-radius: 14px;
            font-weight: 900; text-transform: uppercase; cursor: pointer;
        }

        .btn-exit {
            background: #238636; color: white; border: none; padding: 10px;
            border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 12px;
        }

        #multiplier-row {
            display: flex; gap: 4px; margin-bottom: 10px; justify-content: center;
        }

        .slot {
            flex: 1; height: 25px; border-radius: 6px; font-size: 10px;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <div id="bal-display">💰 0</div>
    <button class="btn-exit" onclick="syncAndExit()">📥 ЗАБРАТЬ И ВЫЙТИ</button>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-panel">
    <div id="multiplier-row"></div>
    <div class="controls">
        <input type="number" id="bet-amount" value="10" min="1">
        <button class="btn-drop" id="drop-btn">СПУСТИТЬ ШАР</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    let balance = parseInt(urlParams.get('bal')) || 0;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const balDisplay = document.getElementById('bal-display');
    const dpr = window.devicePixelRatio || 1;

    let balls = [];
    const ROWS = 9;
    const multipliers = [10, 5, 2, 0.5, 0.2, 0.5, 2, 5, 10];

    function syncAndExit() {
        tg.HapticFeedback.notificationOccurred('success');
        tg.sendData(JSON.stringify({ 
            action: "sync_balance", 
            final_balance: balance 
        }));
    }

    function resize() {
        canvas.width = canvas.clientWidth * dpr;
        canvas.height = canvas.clientHeight * dpr;
        ctx.scale(dpr, dpr);
    }

    class Ball {
        constructor(x, bet) {
            this.x = x; this.y = 20;
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = 0; this.bet = bet;
            this.finished = false;
        }

        update() {
            this.vy += 0.4;
            this.x += this.vx;
            this.y += this.vy;

            // Логика столкновений (упрощенно для примера)
            if (this.y > canvas.height/dpr - 30 && !this.finished) {
                this.finished = true;
                this.onLand();
                return false;
            }
            return true;
        }

        onLand() {
            const w = canvas.width / dpr;
            const idx = Math.floor((this.x / w) * multipliers.length);
            const m = multipliers[Math.min(idx, multipliers.length - 1)];
            
            balance += Math.floor(this.bet * m);
            updateUI();

            // АВТОСОХРАНЕНИЕ: Если куш хороший (больше x2), сохраняем сразу
            if (m >= 2) {
                tg.HapticFeedback.notificationOccurred('success');
                setTimeout(syncAndExit, 800); 
            }
        }
    }

    function updateUI() {
        balDisplay.innerText = `💰 ${balance}`;
    }

    document.getElementById('drop-btn').onclick = () => {
        const bet = parseInt(document.getElementById('bet-amount').value);
        if (bet > balance || bet <= 0) return;
        
        balance -= bet;
        updateUI();
        balls.push(new Ball(canvas.width/dpr/2, bet));
        tg.HapticFeedback.impactOccurred('light');
    };

    function animate() {
        ctx.clearRect(0, 0, canvas.width/dpr, canvas.height/dpr);
        
        // Рисуем «лунки» множителей
        const w = canvas.width / dpr;
        const sw = w / multipliers.length;
        multipliers.forEach((m, i) => {
            ctx.fillStyle = m >= 1 ? '#2ea043' : '#ff4d4d';
            ctx.fillRect(i * sw + 2, canvas.height/dpr - 25, sw - 4, 20);
        });

        balls = balls.filter(b => {
            if (b.update()) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 6, 0, Math.PI*2);
                ctx.fillStyle = '#00f2ff';
                ctx.fill();
                return true;
            }
            return false;
        });
        requestAnimationFrame(animate);
    }

    window.onresize = resize;
    resize();
    updateUI();
    animate();
</script>
</body>
</html>
