<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLINKO HD V2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0a0b10;
            --panel: #161b22;
            --save-btn: #2ea043;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            align-items: center; height: 100vh;
        }

        #game-wrapper {
            position: relative; width: 100%; max-width: 500px;
            height: 100%; display: flex; flex-direction: column;
        }

        .header {
            display: flex; flex-direction: column; align-items: center; padding: 15px;
            z-index: 10; background: rgba(0,0,0,0.3);
        }

        .stats-row { width: 100%; display: flex; justify-content: space-between; margin-bottom: 5px; }
        
        #bal-display { color: var(--primary); font-weight: 800; font-size: 1.3rem; }
        #debug-info { font-size: 10px; color: rgba(255,255,255,0.4); }

        canvas { 
            display: block; width: 100%; flex-grow: 1; 
            touch-action: none; image-rendering: high-quality;
        }

        .ui-panel {
            background: var(--panel); padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 8px; }
        
        input, select {
            flex: 1; background: #0d1117; border: 1px solid #30363d;
            color: white; padding: 10px; border-radius: 10px; outline: none;
            font-size: 14px;
        }

        .btn-main {
            padding: 14px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #00f2ff 0%, #0066ff 100%);
            color: white; font-weight: 900; cursor: pointer;
            text-transform: uppercase; font-size: 14px;
        }

        .btn-save {
            background: var(--save-btn); padding: 8px; font-size: 12px;
            border: none; border-radius: 8px; color: white; font-weight: bold;
            margin-top: 5px; cursor: pointer;
        }

        #multiplier-row {
            display: flex; justify-content: center; gap: 3px; margin-bottom: 10px;
        }

        .slot {
            flex: 1; height: 24px; border-radius: 5px;
            font-size: 10px; display: flex; align-items: center;
            justify-content: center; font-weight: bold;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="header">
        <div class="stats-row">
            <div id="bal-display">💰 0</div>
            <div id="status">HD PLINKO</div>
        </div>
        <div id="debug-info">Загрузка данных...</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-panel">
        <div id="multiplier-row"></div>
        <div class="controls">
            <div class="row">
                <input type="number" id="bet-amount" value="10" min="1">
                <select id="difficulty">
                    <option value="low">НИЗКИЙ РИСК</option>
                    <option value="mid" selected>СРЕДНИЙ</option>
                    <option value="high">ВЫСОКИЙ</option>
                </select>
            </div>
            <button id="drop-btn" class="btn-main">ЗАПУСТИТЬ ШАР</button>
            <button id="save-btn" class="btn-save">ВЫЙТИ И СОХРАНИТЬ ⭐</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const rawBal = urlParams.get('bal');
    const vKey = urlParams.get('v');
    let balance = parseInt(rawBal) || 0;

    // ОТЛАДКА НА ЭКРАНЕ
    document.getElementById('debug-info').innerText = `ID: ${vKey || 'no-v'} | GET: ${rawBal || '0'}`;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const balDisplay = document.getElementById('bal-display');
    const dpr = window.devicePixelRatio || 1;
    const ROWS = 8; 
    const BALL_RADIUS = 7;
    const PIN_RADIUS = 2.5;

    let pins = [];
    let balls = [];

    const DIFF_SETTINGS = {
        low:  [1.5, 1.2, 1.1, 1.1, 1.2, 1.5],
        mid:  [5, 2, 0.5, 0.5, 2, 5],
        high: [20, 10, 0.1, 0.1, 10, 20]
    };
    let multipliers = DIFF_SETTINGS.mid;

    function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        createPins();
    }

    function createPins() {
        pins = [];
        const w = canvas.width / dpr;
        const h = canvas.height / dpr;
        const spacingX = w / (ROWS + 1);
        const spacingY = (h - 80) / ROWS;
        for (let r = 2; r <= ROWS; r++) {
            for (let i = 0; i < r; i++) {
                const x = w / 2 + (i - (r - 1) / 2) * spacingX;
                const y = r * spacingY + 20;
                pins.push({ x, y });
            }
        }
    }

    function updateMultipliers() {
        multipliers = DIFF_SETTINGS[document.getElementById('difficulty').value];
        const row = document.getElementById('multiplier-row');
        row.innerHTML = '';
        multipliers.forEach(m => {
            const div = document.createElement('div');
            div.className = 'slot';
            div.innerText = 'x' + m;
            div.style.background = m >= 1 ? '#2ea043' : '#ff4d4d';
            row.appendChild(div);
        });
    }

    class Ball {
        constructor(x, bet) {
            this.x = x; this.y = -10;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = 0;
            this.bet = bet;
        }

        update() {
            this.vy += 0.4;
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= 0.99;

            pins.forEach(p => {
                const dx = this.x - p.x;
                const dy = this.y - p.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < BALL_RADIUS + PIN_RADIUS) {
                    const angle = Math.atan2(dy, dx);
                    this.vx = Math.cos(angle) * 2.5 + (Math.random() - 0.5);
                    this.vy = Math.sin(angle) * 2.5;
                    tg.HapticFeedback.impactOccurred('light');
                }
            });

            const w = canvas.width / dpr;
            if (this.x < BALL_RADIUS) { this.x = BALL_RADIUS; this.vx *= -0.5; }
            if (this.x > w - BALL_RADIUS) { this.x = w - BALL_RADIUS; this.vx *= -0.5; }

            if (this.y > (canvas.height / dpr) - 10) {
                this.calculateWin();
                return false;
            }
            return true;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, BALL_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = '#00f2ff';
            ctx.shadowBlur = 10; ctx.shadowColor = '#00f2ff';
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        calculateWin() {
            const w = canvas.width / dpr;
            const sectionWidth = w / multipliers.length;
            const index = Math.max(0, Math.min(Math.floor(this.x / sectionWidth), multipliers.length - 1));
            const m = multipliers[index];
            balance += Math.floor(this.bet * m);
            updateUI();
        }
    }

    document.getElementById('drop-btn').onclick = () => {
        const bet = parseInt(document.getElementById('bet-amount').value);
        if (bet > balance || bet <= 0) return alert("Недостаточно баланса!");
        balance -= bet;
        updateUI();
        balls.push(new Ball((canvas.width/dpr)/2 + (Math.random()-0.5)*15, bet));
    };

    // КНОПКА СОХРАНЕНИЯ (Синхронизирует и закрывает)
    document.getElementById('save-btn').onclick = () => {
        tg.HapticFeedback.notificationOccurred('success');
        tg.sendData(JSON.stringify({ action: "sync_balance", final_balance: balance }));
    };

    function updateUI() { balDisplay.innerText = `💰 ${balance}`; }

    function animate() {
        ctx.clearRect(0, 0, canvas.width/dpr, canvas.height/dpr);
        ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
        pins.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, PIN_RADIUS, 0, Math.PI * 2); ctx.fill();
        });
        balls = balls.filter(b => {
            if (b.update()) { b.draw(); return true; }
            return false;
        });
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    updateMultipliers();
    updateUI();
    animate();
</script>
</body>
</html>
