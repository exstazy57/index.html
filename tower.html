<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOWER HD PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0a0b10;
            --card: #161b22;
            --win: #2ea043;
            --loss: #ff4d4d;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            align-items: center; height: 100vh;
        }

        #game-wrapper {
            width: 100%; max-width: 400px; height: 100%;
            display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;
        }

        .header {
            display: flex; justify-content: space-between; padding: 10px 5px;
            font-weight: 800; font-size: 1.2rem; color: var(--primary);
        }

        .tower-container {
            flex-grow: 1; display: flex; flex-direction: column-reverse;
            gap: 8px; overflow-y: auto; padding: 10px;
            background: rgba(255,255,255,0.02); border-radius: 20px;
        }

        .row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            opacity: 0.2; transition: 0.3s; padding: 5px; border-radius: 12px;
        }

        .row.active { opacity: 1; background: rgba(0, 242, 255, 0.1); border: 1px dashed var(--primary); }

        .cell {
            aspect-ratio: 2.2/1; background: var(--card); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
        }

        .cell.correct { background: var(--win); box-shadow: 0 0 15px var(--win); }
        .cell.wrong { background: var(--loss); }

        .ui-panel {
            background: var(--card); padding: 20px; border-radius: 24px 24px 0 0;
            border-top: 1px solid rgba(255,255,255,0.1); margin-top: 10px;
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        
        input {
            width: 100%; background: #0d1117; border: 1px solid #30363d;
            color: white; padding: 12px; border-radius: 12px; text-align: center;
        }

        button {
            padding: 16px; border: none; border-radius: 14px;
            font-weight: 900; text-transform: uppercase; cursor: pointer;
        }

        #start-btn { background: linear-gradient(135deg, #00f2ff, #0066ff); color: white; }
        #cashout-btn { background: var(--win); color: white; display: none; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="header">
        <div id="bal-display">💰 ЗАГРУЗКА...</div>
        <div>TOWER</div>
    </div>

    <div class="tower-container" id="tower"></div>

    <div class="ui-panel">
        <div class="controls">
            <input type="number" id="bet-amount" value="10" min="1">
            <button id="start-btn">ИГРАТЬ</button>
            <button id="cashout-btn">ЗАБРАТЬ: 0 ⭐</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ЧИТАЕМ БАЛАНС ИЗ ССЫЛКИ
    const urlParams = new URLSearchParams(window.location.search);
    let balance = parseInt(urlParams.get('bal')) || 0;
    
    const tower = document.getElementById('tower');
    const balDisplay = document.getElementById('bal-display');
    const startBtn = document.getElementById('start-btn');
    const cashoutBtn = document.getElementById('cashout-btn');

    let currentLevel = 0;
    let isGameOver = true;
    let currentBet = 0;
    const MAX_LEVELS = 8;

    function updateUI() {
        balDisplay.innerText = `💰 ${balance}`;
    }

    function createTower() {
        tower.innerHTML = '';
        for (let i = 0; i < MAX_LEVELS; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            row.id = `row-${i}`;
            for (let j = 0; j < 3; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => tapCell(i, j, cell);
                row.appendChild(cell);
            }
            tower.appendChild(row);
        }
    }

    function startGame() {
        const bet = parseInt(document.getElementById('bet-amount').value);
        if (bet > balance || bet <= 0) {
            tg.HapticFeedback.notificationOccurred('error');
            return alert("Недостаточно звезд!");
        }

        balance -= bet;
        currentBet = bet;
        currentLevel = 0;
        isGameOver = false;
        
        createTower();
        updateUI();
        document.getElementById(`row-0`).classList.add('active');

        startBtn.style.display = 'none';
        cashoutBtn.style.display = 'block';
        cashoutBtn.innerText = `ЗАБРАТЬ: ${currentBet} ⭐`;
        tg.HapticFeedback.impactOccurred('medium');
    }

    function tapCell(lvl, pos, cell) {
        if (isGameOver || lvl !== currentLevel) return;

        const minePos = Math.floor(Math.random() * 3);

        if (pos === minePos) {
            cell.classList.add('wrong');
            cell.innerText = '💣';
            tg.HapticFeedback.notificationOccurred('error');
            isGameOver = true;
            setTimeout(() => {
                startBtn.style.display = 'block';
                cashoutBtn.style.display = 'none';
                updateUI();
            }, 600);
        } else {
            cell.classList.add('correct');
            cell.innerText = '💎';
            tg.HapticFeedback.impactOccurred('light');
            
            currentLevel++;
            currentBet = Math.floor(currentBet * 1.45);
            cashoutBtn.innerText = `ЗАБРАТЬ: ${currentBet} ⭐`;

            if (currentLevel >= MAX_LEVELS) {
                cashout();
            } else {
                document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
                document.getElementById(`row-${currentLevel}`).classList.add('active');
            }
        }
    }

    function cashout() {
        if (isGameOver) return;
        isGameOver = true;
        balance += currentBet;
        updateUI();
        
        tg.HapticFeedback.notificationOccurred('success');
        
        // ОТПРАВКА ДАННЫХ И ВЫХОД
        setTimeout(() => {
            tg.sendData(JSON.stringify({ 
                action: "sync_balance", 
                final_balance: balance 
            }));
        }, 500);
    }

    startBtn.onclick = startGame;
    cashoutBtn.onclick = cashout;

    // Инициализация при запуске
    createTower();
    updateUI();
</script>
</body>
</html>
