<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tower AAA Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0b0e; --card: #16171d; --accent: #00f2ff; --green: #00ff88; --red: #ff0055; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Фикс отображения - Гарантируем видимость контейнера */
        #main-wrapper { display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; visibility: visible !important; opacity: 1 !important; }

        .app-header { display: flex; justify-content: space-between; padding: 25px 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid #222; }
        .stat-group b { font-size: 22px; color: #ffcc00; display: block; }
        .stat-group span { font-size: 10px; color: #777; text-transform: uppercase; }

        #grid-target { flex-grow: 1; display: flex; flex-direction: column-reverse; gap: 8px; padding: 15px; justify-content: center; align-items: center; }
        .game-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 320px; transition: 0.3s; opacity: 0.2; }
        .game-row.active { opacity: 1; transform: scale(1.02); }
        
        .game-cell { aspect-ratio: 1/1; background: var(--card); border: 1px solid #2a2a32; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .game-cell.win { background: rgba(0, 255, 136, 0.15); border-color: var(--green); color: var(--green); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        .game-cell.loss { background: rgba(255, 0, 85, 0.15); border-color: var(--red); }

        .game-footer { background: var(--card); padding: 25px; border-radius: 30px 30px 0 0; border-top: 1px solid #333; }
        .input-area { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .input-area button { width: 45px; height: 45px; border-radius: 12px; background: #25262e; border: 1px solid #444; color: #fff; font-size: 20px; }
        #bet-field { background: #000; border: 1px solid #444; color: #fff; width: 110px; height: 45px; text-align: center; border-radius: 12px; font-size: 20px; font-weight: bold; }
        
        .main-btn { width: 100%; padding: 18px; border: none; border-radius: 16px; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .play-btn { background: linear-gradient(135deg, #7000ff, #00f2ff); color: #fff; box-shadow: 0 5px 20px rgba(112,0,255,0.3); }
        .cash-btn { background: var(--green); color: #000; display: none; }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <div class="app-header">
            <div class="stat-group">
                <span>БАЛАНС</span>
                <b id="bal-val">0</b>
            </div>
            <div class="stat-group" style="text-align: right">
                <span>МНОЖИТЕЛЬ</span>
                <b id="mult-val" style="color:var(--accent)">x1.00</b>
            </div>
        </div>

        <div id="grid-target"></div>

        <div class="game-footer">
            <div class="input-area">
                <button onclick="changeBet(-10)">−</button>
                <input type="number" id="bet-field" value="10" inputmode="numeric">
                <button onclick="changeBet(10)">+</button>
            </div>
            <button id="btn-play" class="main-btn play-btn" onclick="start()">НАЧАТЬ ИГРУ</button>
            <button id="btn-cash" class="main-btn cash-btn" onclick="collect(true)">ЗАБРАТЬ: <span id="win-sum">0</span></button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. ПЕРЕМЕННЫЕ
        const urlParams = new URLSearchParams(window.location.search);
        let balance = parseInt(urlParams.get('bal')) || 1000;
        let currentBet = 0, currentLevel = 0, currentMult = 1.0;
        let isPlaying = false, bombMap = [];

        // 2. ЭЛЕМЕНТЫ
        const elGrid = document.getElementById('grid-target');
        const elBal = document.getElementById('bal-val');
        const elMult = document.getElementById('mult-val');
        const elWin = document.getElementById('win-sum');
        const elBtnPlay = document.getElementById('btn-play');
        const elBtnCash = document.getElementById('btn-cash');
        const elBetInput = document.getElementById('bet-field');

        // 3. ФУНКЦИИ ГЕНЕРАЦИИ (БЕЗ ОШИБОК)
        function renderGrid() {
            elGrid.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                const rowObj = document.createElement('div');
                rowObj.className = 'game-row';
                rowObj.id = `row-${r}`;
                for (let c = 0; c < 4; c++) {
                    const cellObj = document.createElement('div');
                    cellObj.className = 'game-cell';
                    cellObj.id = `cell-${r}-${c}`;
                    cellObj.onclick = () => handleStep(r, c);
                    rowObj.appendChild(cellObj);
                }
                elGrid.appendChild(rowObj);
            }
            elBal.innerText = balance.toLocaleString();
        }

        function changeBet(v) {
            let n = parseInt(elBetInput.value) + v;
            if (n > 0) { elBetInput.value = n; tg.HapticFeedback.impactOccurred('light'); }
        }

        function start() {
            currentBet = parseInt(elBetInput.value);
            if (currentBet > balance || currentBet <= 0) return tg.showAlert("❌ Недостаточно ⭐ звезд!");

            balance -= currentBet;
            isPlaying = true; currentLevel = 0; currentMult = 1.0;
            bombMap = Array.from({length: 8}, () => Math.floor(Math.random() * 4));

            renderGrid();
            refreshRows();
            
            elBtnPlay.style.display = 'none';
            elBtnCash.style.display = 'block';
            elBetInput.disabled = true;
            
            tg.HapticFeedback.impactOccurred('medium');
        }

        function refreshRows() {
            for(let i=0; i<8; i++) {
                const row = document.getElementById(`row-${i}`);
                if(row) row.className = i === currentLevel ? 'game-row active' : 'game-row';
            }
            elBal.innerText = balance.toLocaleString();
            elMult.innerText = `x${currentMult.toFixed(2)}`;
            elWin.innerText = Math.floor(currentBet * currentMult);
        }

        function handleStep(r, c) {
            if (!isPlaying || r !== currentLevel) return;

            const targetCell = document.getElementById(`cell-${r}-${c}`);
            if (c === bombMap[currentLevel]) {
                targetCell.innerHTML = '💣';
                targetCell.classList.add('loss');
                tg.HapticFeedback.notificationOccurred('error');
                isPlaying = false;
                // Авто-перезагрузка при проигрыше
                setTimeout(() => {
                    const data = { bal: balance, uid: urlParams.get('uid'), win: "no" };
                    tg.sendData(JSON.stringify(data));
                    location.reload(); 
                }, 1500);
            } else {
                targetCell.innerHTML = '💎';
                targetCell.classList.add('win');
                tg.HapticFeedback.impactOccurred('light');
                currentLevel++;
                currentMult += (0.4 + (currentLevel * 0.05));
                if (currentLevel > 7) collect(true);
                else refreshRows();
            }
        }

        function collect(isWin) {
            if (!isPlaying && isWin) return;
            if (isWin) balance += Math.floor(currentBet * currentMult);
            
            tg.HapticFeedback.notificationOccurred('success');
            
            // Финальные данные для бота
            const finalPayload = {
                uid: urlParams.get('uid'),
                bal: balance,
                win: isWin ? "yes" : "no",
                sign: urlParams.get('sign')
            };

            tg.sendData(JSON.stringify(finalPayload));
            setTimeout(() => tg.close(), 300);
        }

        // Прямой запуск рендеринга сразу при загрузке
        window.onload = renderGrid;
    </script>
</body>
</html>
