<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOWER FIX</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0a0b; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { display: flex; justify-content: space-between; padding: 10px; background: #161618; border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; }
        #grid { flex-grow: 1; display: grid; grid-template-rows: repeat(8, 1fr); gap: 8px; margin-bottom: 15px; }
        .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; opacity: 0.2; pointer-events: none; transition: 0.3s; }
        .row.active { opacity: 1; pointer-events: auto; }
        .cell { background: #1c1c1e; border: 1px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: 0.2s; }
        .cell.win { background: rgba(0, 255, 136, 0.2); border-color: #00ff88; color: #00ff88; }
        .cell.loss { background: rgba(255, 0, 85, 0.2); border-color: #ff0055; color: #ff0055; }
        .footer { background: #161618; padding: 20px; border-radius: 20px 20px 0 0; margin: 0 -15px -15px -15px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-play { background: #00f2ff; color: #000; }
        .btn-cash { background: #00ff88; color: #000; display: none; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">
        <div>Баланс: <b id="bal">1000</b> ⭐</div>
        <div>Множ: <b id="mult" style="color:#00f2ff">x1.00</b></div>
    </div>

    <div id="grid"></div>

    <div class="footer">
        <input type="number" id="bet" value="10">
        <button id="btn-start" class="btn btn-play" onclick="gameStart()">ИГРАТЬ</button>
        <button id="btn-cash" class="btn btn-cash" onclick="gameCashout()">ЗАБРАТЬ: <span id="win-amt">0</span></button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const p = new URLSearchParams(window.location.search);
    let balance = parseInt(p.get('bal')) || 1000;
    let bet = 0, rowIdx = 0, mult = 1.0, isPlay = false, bombs = [];

    const elBal = document.getElementById('bal');
    const elMult = document.getElementById('mult');
    const elGrid = document.getElementById('grid');
    const bStart = document.getElementById('btn-start');
    const bCash = document.getElementById('btn-cash');

    function draw() {
        elGrid.innerHTML = '';
        for(let r=7; r>=0; r--) {
            const row = document.createElement('div');
            row.className = 'row'; row.id = 'r'+r;
            for(let c=0; c<4; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.onclick = () => step(r, c);
                cell.id = `c-${r}-${c}`;
                row.appendChild(cell);
            }
            elGrid.appendChild(row);
        }
        elBal.innerText = balance;
    }

    function gameStart() {
        bet = parseInt(document.getElementById('bet').value);
        if(bet > balance || bet <= 0) return alert("Недостаточно звезд!");
        balance -= bet; isPlay = true; rowIdx = 0; mult = 1.0;
        bombs = Array.from({length: 8}, () => Math.floor(Math.random() * 4));
        bStart.style.display = 'none'; bCash.style.display = 'block';
        updateUI();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function updateUI() {
        document.querySelectorAll('.row').forEach((r, i) => r.classList.toggle('active', 7-i === rowIdx));
        elBal.innerText = balance;
        elMult.innerText = 'x' + mult.toFixed(2);
        document.getElementById('win-amt').innerText = Math.floor(bet * mult);
    }

    function step(r, c) {
        if(!isPlay || r !== rowIdx) return;
        const cell = document.getElementById(`c-${r}-${c}`);
        if(c === bombs[r]) {
            cell.innerHTML = '💣'; cell.classList.add('loss');
            tg.HapticFeedback.notificationOccurred('error');
            isPlay = false; setTimeout(() => location.reload(), 1200);
        } else {
            cell.innerHTML = '💎'; cell.classList.add('win');
            tg.HapticFeedback.impactOccurred('light');
            rowIdx++; mult += 0.45;
            if(rowIdx > 7) gameCashout(); else updateUI();
        }
    }

    function gameCashout() {
        balance += Math.floor(bet * mult);
        tg.sendData(JSON.stringify({bal: balance, uid: p.get('uid')}));
        tg.close();
    }

    draw();
</script>
</body>
</html>
