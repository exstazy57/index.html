<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Omni-Hub: Tower AAA Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #050507; --card: #111218; --primary: #00f2ff; --secondary: #7000ff;
            --success: #00ff88; --danger: #ff0055; --gold: #ffcc00;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: #fff; font-family: -apple-system, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, #111, transparent); z-index: 10;
        }
        .stats-item span { font-size: 10px; color: #777; display: block; text-transform: uppercase; }
        .stats-item b { font-size: 20px; color: var(--gold); }
        .mult-val { color: var(--primary) !important; text-shadow: 0 0 10px rgba(0,242,255,0.3); }

        #game-container {
            flex-grow: 1; display: flex; flex-direction: column-reverse; 
            gap: 10px; padding: 20px; justify-content: center; align-items: center;
        }
        .row {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            width: 100%; max-width: 320px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .row.inactive { opacity: 0.2; transform: scale(0.95); pointer-events: none; }
        .row.current { opacity: 1; transform: scale(1.05); }

        .cell {
            aspect-ratio: 1/1; background: var(--card); border: 1px solid #222;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; transition: 0.2s; position: relative;
        }
        .cell.win { background: rgba(0, 255, 136, 0.1); border-color: var(--success); color: var(--success); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        .cell.loss { background: rgba(255, 0, 85, 0.1); border-color: var(--danger); animation: shake 0.4s; }
        
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        .controls {
            background: var(--card); padding: 25px; border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .bet-box {
            display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px;
        }
        .bet-btn {
            width: 45px; height: 45px; border-radius: 12px; border: 1px solid #333;
            background: #1a1a1c; color: #fff; font-size: 20px; font-weight: bold;
        }
        #bet-input {
            background: #000; border: 1px solid #333; color: #fff; padding: 12px;
            width: 100px; text-align: center; border-radius: 12px; font-size: 18px;
        }
        .action-btn {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            font-weight: bold; font-size: 16px; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-play { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: #fff; }
        .btn-cash { background: var(--success); color: #000; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stats-item">
            <span>Твой Баланс</span>
            <b id="bal-txt">0</b> ⭐
        </div>
        <div class="stats-item" style="text-align: right;">
            <span>Множитель</span>
            <b id="mult-txt" class="mult-val">x1.00</b>
        </div>
    </div>

    <div id="game-container"></div>

    <div class="controls">
        <div class="bet-box">
            <button class="bet-btn" onclick="adjustBet(-10)">−</button>
            <input type="number" id="bet-input" value="10">
            <button class="bet-btn" onclick="adjustBet(10)">+</button>
        </div>
        <button id="main-btn" class="action-btn btn-play" onclick="startGame()">НАЧАТЬ ИГРУ</button>
        <button id="cash-btn" class="action-btn btn-cash" onclick="cashout()">ЗАБРАТЬ: <span id="win-txt">0</span></button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. ПАРАМЕТРЫ И СОСТОЯНИЕ
        const params = new URLSearchParams(window.location.search);
        let balance = parseInt(params.get('bal')) || 1000;
        let currentBet = 0, currentRow = 0, multiplier = 1.0;
        let isPlaying = false, bombs = [];

        const elGrid = document.getElementById('game-container');
        const elBal = document.getElementById('bal-txt');
        const elMult = document.getElementById('mult-txt');
        const elWin = document.getElementById('win-txt');
        const elMainBtn = document.getElementById('main-btn');
        const elCashBtn = document.getElementById('cash-btn');
        const elInput = document.getElementById('bet-input');

        // 2. ИНИЦИАЛИЗАЦИЯ ПОЛЯ
        function createGrid() {
            elGrid.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                const row = document.createElement('div');
                row.className = 'row inactive';
                row.id = `row-${r}`;
                for (let c = 0; c < 4; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `c-${r}-${c}`;
                    cell.onclick = () => handleCellClick(r, c);
                    row.appendChild(cell);
                }
                elGrid.appendChild(row);
            }
            elBal.innerText = balance.toLocaleString();
        }

        // 3. ЛОГИКА ИГРЫ
        function adjustBet(val) {
            let n = parseInt(elInput.value) + val;
            if (n > 0) elInput.value = n;
            tg.HapticFeedback.impactOccurred('light');
        }

        function startGame() {
            currentBet = parseInt(elInput.value);
            if (currentBet > balance || currentBet <= 0) {
                return tg.showAlert("❌ Недостаточно средств!");
            }

            balance -= currentBet;
            isPlaying = true; currentRow = 0; multiplier = 1.0;
            // Генерация бомб
            bombs = Array.from({length: 8}, () => Math.floor(Math.random() * 4));

            createGrid();
            updateUIRender();
            
            elMainBtn.style.display = 'none';
            elCashBtn.style.display = 'block';
            elInput.disabled = true;
            
            tg.HapticFeedback.impactOccurred('medium');
        }

        function updateUIRender() {
            document.querySelectorAll('.row').forEach((r, idx) => {
                r.className = idx === currentRow ? 'row current' : 'row inactive';
            });
            elBal.innerText = balance.toLocaleString();
            elMult.innerText = `x${multiplier.toFixed(2)}`;
            elWin.innerText = Math.floor(currentBet * multiplier);
        }

        function handleCellClick(r, c) {
            if (!isPlaying || r !== currentRow) return;

            const cell = document.getElementById(`c-${r}-${c}`);
            if (c === bombs[r]) {
                cell.innerHTML = '💣';
                cell.classList.add('loss');
                tg.HapticFeedback.notificationOccurred('error');
                isPlaying = false;
                setTimeout(() => location.reload(), 1500);
            } else {
                cell.innerHTML = '💎';
                cell.classList.add('win');
                tg.HapticFeedback.impactOccurred('light');
                currentRow++;
                multiplier += 0.42;
                if (currentRow > 7) cashout();
                else updateUIRender();
            }
        }

        function cashout() {
            if (!isPlaying) return;
            const win = Math.floor(currentBet * multiplier);
            balance += win;
            isPlaying = false;
            
            tg.HapticFeedback.notificationOccurred('success');
            
            // Синхронизация с ботом
            const data = {
                final_balance: balance,
                uid: params.get('uid'),
                sign: params.get('sign')
            };
            tg.sendData(JSON.stringify(data));
            setTimeout(() => tg.close(), 500);
        }

        createGrid();
    </script>
</body>
</html>
