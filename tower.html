<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>TOWER SUPREME PROTECT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --p: #00f2ff; 
            --bg: #0a0b10; 
            --c: #161b22; 
            --w: #2ea043; 
            --l: #ff4d4d; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
        }

        /* Шапка с балансом */
        .header { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(0,0,0,0.4); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        #bal-view { color: var(--p); font-weight: 900; font-size: 1.3rem; text-shadow: 0 0 10px rgba(0,242,255,0.3); }
        .ver { opacity: 0.3; font-size: 0.7rem; letter-spacing: 1px; }

        /* Игровое поле */
        .grid { 
            flex-grow: 1; display: flex; flex-direction: column-reverse; 
            gap: 10px; padding: 20px; overflow-y: auto; 
            background: radial-gradient(circle at center, #1a1f2c 0%, var(--bg) 100%);
        }
        .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; opacity: 0.2; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .row.active { opacity: 1; transform: scale(1.02); }
        
        .cell { 
            aspect-ratio: 1.8/1; background: var(--c); border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05); display: flex; 
            align-items: center; justify-content: center; font-size: 1.6rem; 
            transition: 0.2s; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .cell.win { background: var(--w); border: none; box-shadow: 0 0 20px var(--w); transform: rotateY(360deg); transition: 0.6s; }
        .cell.loss { background: var(--l); border: none; box-shadow: 0 0 20px var(--l); }

        /* Панель управления */
        .panel { 
            background: var(--c); padding: 25px; 
            border-radius: 30px 30px 0 0; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .input-box {
            background: #0d1117; border: 1px solid #30363d;
            border-radius: 15px; padding: 12px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center;
        }
        input { 
            background: none; border: none; color: white; width: 100%; 
            text-align: center; font-size: 1.2rem; font-weight: 700; outline: none;
        }

        button { 
            width: 100%; padding: 20px; border-radius: 18px; border: none; 
            font-weight: 900; font-size: 1.1rem; text-transform: uppercase; 
            cursor: pointer; transition: 0.3s active; 
        }
        .btn-start { background: linear-gradient(135deg, #00f2ff, #0066ff); color: white; box-shadow: 0 5px 15px rgba(0,102,255,0.4); }
        .btn-cash { background: var(--w); color: white; display: none; box-shadow: 0 5px 15px rgba(46,160,67,0.4); }
        button:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>

<div class="header">
    <div id="bal-view">💰 0</div>
    <div class="ver" id="session-tag">SID: LOADING</div>
</div>

<div class="grid" id="grid"></div>

<div class="panel">
    <div class="input-box">
        <input type="number" id="bet-input" value="10" min="1">
    </div>
    <button id="btn-start" class="btn-start">ИГРАТЬ</button>
    <button id="btn-cash" class="btn-cash">ЗАБРАТЬ: 0</button>
</div>

<script>
    // УРОВЕНЬ 3: СИНХРОНИЗАЦИЯ С WEBAPP
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // УРОВЕНЬ 4: ПРИНУДИТЕЛЬНОЕ ЧТЕНИЕ БАЛАНСА ИЗ URL (ЗАЩИТА ОТ КЭША)
    const urlParams = new URLSearchParams(window.location.search);
    let balance = parseInt(urlParams.get('bal')) || 0;
    
    // Метка сессии для отладки (Level 2)
    document.getElementById('session-tag').innerText = "SID: " + (urlParams.get('v') || 'OLD_CACHE');

    const balView = document.getElementById('bal-view');
    const grid = document.getElementById('grid');
    const btnStart = document.getElementById('btn-start');
    const btnCash = document.getElementById('btn-cash');
    const betInput = document.getElementById('bet-input');

    let level = 0;
    let isPlaying = false;
    let currentBet = 0;
    const MAX_LEVEL = 8;

    function syncUI() {
        balView.innerText = `💰 ${balance}`;
    }

    function buildTower() {
        grid.innerHTML = '';
        for(let i=0; i < MAX_LEVEL; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            row.id = `row-${i}`;
            for(let j=0; j<3; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => handleMove(i, j, cell);
                row.appendChild(cell);
            }
            grid.appendChild(row);
        }
    }

    btnStart.onclick = () => {
        const bet = parseInt(betInput.value);
        if(bet > balance || bet <= 0) {
            tg.HapticFeedback.notificationOccurred('error');
            return tg.showAlert("Недостаточно ⭐ для ставки!");
        }

        balance -= bet;
        currentBet = bet;
        level = 0;
        isPlaying = true;
        
        syncUI();
        buildTower();
        
        document.getElementById('row-0').classList.add('active');
        btnStart.style.display = 'none';
        btnCash.style.display = 'block';
        btnCash.innerText = `ЗАБРАТЬ: ${currentBet} ⭐`;
        tg.HapticFeedback.impactOccurred('medium');
    };

    function handleMove(rIdx, cIdx, element) {
        if(!isPlaying || rIdx !== level) return;

        const bombPos = Math.floor(Math.random() * 3);

        if(cIdx === bombPos) {
            // ПРОИГРЫШ
            element.className = 'cell loss';
            element.innerText = '💣';
            isPlaying = false;
            tg.HapticFeedback.notificationOccurred('error');
            
            // УРОВЕНЬ 5: СОХРАНЯЕМ ПРОИГРЫШ В БД И ВЫХОДИМ
            setTimeout(() => {
                tg.sendData(JSON.stringify({ action: "sync_balance", final_balance: balance }));
            }, 800);
        } else {
            // УСПЕХ
            element.className = 'cell win';
            element.innerText = '💎';
            level++;
            currentBet = Math.floor(currentBet * 1.5);
            btnCash.innerText = `ЗАБРАТЬ: ${currentBet} ⭐`;
            tg.HapticFeedback.impactOccurred('light');

            if(level < MAX_LEVEL) {
                document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
                document.getElementById(`row-${level}`).classList.add('active');
            } else {
                cashout(); // Автоматический забор на последнем уровне
            }
        }
    }

    function cashout() {
        if(!isPlaying) return;
        isPlaying = false;
        balance += currentBet;
        syncUI();
        tg.HapticFeedback.notificationOccurred('success');

        // УРОВЕНЬ 5: ОТПРАВКА ДАННЫХ В БОТА И ЗАКРЫТИЕ
        setTimeout(() => {
            tg.sendData(JSON.stringify({ action: "sync_balance", final_balance: balance }));
        }, 300);
    }

    btnCash.onclick = cashout;

    // Инициализация при загрузке
    syncUI();
    buildTower();
</script>
</body>
</html>
