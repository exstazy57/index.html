<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omni-Hub: Tower Defense v4.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- ДИЗАЙНЕРСКИЙ БЛОК (CSS3 + НЕОН) --- */
        :root {
            --bg-dark: #0a0a0c;
            --accent-gold: #ffcc00;
            --accent-blue: #00d4ff;
            --danger-red: #ff4d4d;
            --success-green: #2ecc71;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --border-glow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Запрет скролла для мобилок */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Анимация фона */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0c 100%);
            z-index: -1;
        }

        #app-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Шапка с балансом */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
            box-shadow: var(--border-glow);
        }

        .balance-label { font-size: 14px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 22px; font-weight: bold; color: var(--accent-gold); }

        /* Игровое поле */
        #game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            perspective: 1000px;
        }

        .cell {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            transform-style: preserve-3d;
        }

        .cell:active { transform: scale(0.9) translateZ(-10px); }
        .cell.active { background: rgba(0, 212, 255, 0.2); border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
        .cell.win { background: rgba(46, 204, 113, 0.3); border-color: var(--success-green); color: var(--success-green); }
        .cell.loss { background: rgba(255, 77, 77, 0.3); border-color: var(--danger-red); }
        .cell.disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }

        /* Панель управления */
        .controls {
            background: var(--glass-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; opacity: 0.6; }
        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-play { background: linear-gradient(45deg, var(--accent-blue), #0056b3); color: white; box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3); }
        .btn-cashout { background: linear-gradient(45deg, #27ae60, #2ecc71); color: white; display: none; }
        button:disabled { background: #333; color: #777; box-shadow: none; cursor: not-allowed; }

        /* История и Статистика */
        .stats-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            font-size: 12px;
            opacity: 0.5;
        }

        /* Анимации взрыва */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake { animation: shake 0.5s infinite; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <div>
            <div class="balance-label">Игровой баланс</div>
            <div id="balance" class="balance-value">0 ⭐</div>
        </div>
        <div style="text-align: right;">
            <div class="balance-label">Коэффициент</div>
            <div id="multiplier" class="balance-value" style="color: var(--accent-blue)">x1.00</div>
        </div>
    </div>

    <div id="game-grid">
        </div>

    <div class="controls">
        <div class="input-group">
            <label>Сумма ставки (звезды)</label>
            <input type="number" id="bet-input" value="10" min="1">
        </div>
        <button id="btn-main" class="btn-play">Начать игру</button>
        <button id="btn-cash" class="btn-cashout">Забрать выигрыш</button>
    </div>

    <div class="stats-footer">
        <span>OmniHub Guard 4.0</span>
        <span id="session-id">SID: ...</span>
        <span>Secure Protocol: AES-CTR</span>
    </div>
</div>

<script>
    /* =================================================================
       --- ЯДРО БЕЗОПАСНОСТИ И ЛОГИКИ (TRIPLE-LOCK JS) ---
    ================================================================= */
    
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // 1. Инициализация параметров из URL (Уровень 1 шифра)
    const urlParams = new URLSearchParams(window.location.search);
    const CONFIG = {
        uid: urlParams.get('uid'),
        startBal: parseInt(urlParams.get('bal')) || 0,
        ts: urlParams.get('ts'),
        sign: urlParams.get('sign'),
        salt: urlParams.get('s'),
        rows: 8,
        cols: 4
    };

    // Состояние игры
    let state = {
        balance: CONFIG.startBal,
        currentBet: 0,
        currentRow: 0,
        isPlaying: false,
        bombs: [],
        history: [],
        multiplier: 1.00
    };

    // DOM Элементы
    const elBalance = document.getElementById('balance');
    const elMultiplier = document.getElementById('multiplier');
    const elGrid = document.getElementById('game-grid');
    const elBetInput = document.getElementById('bet-input');
    const elBtnMain = document.getElementById('btn-main');
    const elBtnCash = document.getElementById('btn-cash');

    /* --- УРОВЕНЬ 2: ГЕНЕРАЦИЯ СЕТКИ (SEED-BASED) --- */
    function generateBombs() {
        // Используем соль и время для детерминированной генерации
        const bombs = [];
        let seed = parseInt(CONFIG.ts.slice(-6)) + parseInt(CONFIG.uid.slice(-4));
        
        for(let i = 0; i < state.rows; i++) {
            // Линейный конгруэнтный генератор (простейший)
            seed = (seed * 1103515245 + 12345) & 0x7fffffff;
            bombs.push(seed % state.cols);
        }
        return bombs;
    }

    function initGrid() {
        elGrid.innerHTML = '';
        // Создаем сетку сверху вниз (от ряда 7 до 0)
        for(let r = state.rows - 1; r >= 0; r--) {
            for(let c = 0; c < state.cols; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell disabled';
                cell.dataset.row = r;
                cell.dataset.col = c;
                cell.id = `cell-${r}-${c}`;
                cell.onclick = () => handleCellClick(r, c);
                elGrid.appendChild(cell);
            }
        }
    }

    function updateBalanceUI() {
        elBalance.innerText = `${state.balance.toLocaleString()} ⭐`;
        elMultiplier.innerText = `x${state.multiplier.toFixed(2)}`;
    }

    /* --- ИГРОВАЯ ЛОГИКА --- */
    function startGame() {
        const bet = parseInt(elBetInput.value);
        if(isNaN(bet) || bet <= 0 || bet > state.balance) {
            tg.HapticFeedback.notificationOccurred('error');
            return alert('Некорректная ставка!');
        }

        state.currentBet = bet;
        state.balance -= bet;
        state.isPlaying = true;
        state.currentRow = 0;
        state.multiplier = 1.00;
        state.bombs = generateBombs();
        state.history = [];

        updateBalanceUI();
        toggleUI(true);
        activateRow(0);
        
        tg.HapticFeedback.impactOccurred('medium');
    }

    function activateRow(rowIdx) {
        // Деактивируем всё
        document.querySelectorAll('.cell').forEach(c => c.classList.add('disabled'));
        // Активируем нужный ряд
        document.querySelectorAll(`.cell[data-row="${rowIdx}"]`).forEach(c => {
            c.classList.remove('disabled');
            c.classList.add('active');
        });
    }

    function handleCellClick(r, c) {
        if(!state.isPlaying || r !== state.currentRow) return;

        const cell = document.getElementById(`cell-${r}-${c}`);
        const bombCol = state.bombs[r];

        if(c === bombCol) {
            // ВЗРЫВ
            gameOver(cell);
        } else {
            // УСПЕХ
            cell.classList.remove('active');
            cell.classList.add('win');
            cell.innerHTML = '💎';
            
            state.currentRow++;
            state.multiplier += 0.45 + (r * 0.1);
            
            tg.HapticFeedback.impactOccurred('light');

            if(state.currentRow >= state.rows) {
                cashout();
            } else {
                activateRow(state.currentRow);
                elMultiplier.innerText = `x${state.multiplier.toFixed(2)}`;
            }
        }
    }

    function gameOver(bombCell) {
        state.isPlaying = false;
        bombCell.classList.add('loss');
        bombCell.innerHTML = '💣';
        document.body.classList.add('shake');
        
        tg.HapticFeedback.notificationOccurred('error');

        setTimeout(() => {
            document.body.classList.remove('shake');
            syncAndClose();
        }, 1500);
    }

    function cashout() {
        if(!state.isPlaying) return;
        
        const winAmount = Math.floor(state.currentBet * state.multiplier);
        state.balance += winAmount;
        state.isPlaying = false;
        
        tg.HapticFeedback.notificationOccurred('success');
        syncAndClose();
    }

    /* --- УРОВЕНЬ 3: СИНХРОНИЗАЦИЯ И ANTI-CHEAT --- */
    function syncAndClose() {
        // Финальная проверка целостности данных
        const payload = {
            action: "sync_balance",
            start_balance: CONFIG.startBal,
            final_balance: state.balance,
            ts: CONFIG.ts,
            sign: CONFIG.sign,
            // Добавляем "отпечаток" игры для аудита админом
            audit: btoa(`uid:${CONFIG.uid}|row:${state.currentRow}|bet:${state.currentBet}`)
        };

        tg.sendData(JSON.stringify(payload));
        
        // Визуальное подтверждение
        elBtnCash.innerText = "СИНХРОНИЗАЦИЯ...";
        setTimeout(() => tg.close(), 100);
    }

    function toggleUI(playing) {
        elBtnMain.style.display = playing ? 'none' : 'block';
        elBtnCash.style.display = playing ? 'block' : 'none';
        elBetInput.disabled = playing;
    }

    // Обработчики кнопок
    elBtnMain.onclick = startGame;
    elBtnCash.onclick = cashout;

    // Анти-дебаг (ловушка для консоли)
    setInterval(() => {
        const startTime = performance.now();
        debugger; 
        const endTime = performance.now();
        if (endTime - startTime > 100) {
            // Если код замер на debugger — консоль открыта
            window.location.href = "about:blank";
        }
    }, 2000);

    // Инициализация
    document.getElementById('session-id').innerText = `SID: ${CONFIG.salt.slice(0,8)}`;
    updateBalanceUI();
    initGrid();

</script>
</body>
</html>
