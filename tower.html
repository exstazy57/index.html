<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Omni-Hub Tower | Ultimate Secure</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- СТИЛИ (NEON DARK MODE) --- */
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --success: #00ff88;
            --danger: #ff0055;
            --bg: #050505;
            --card: #121214;
            --gold: #ffcc00;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #ui-wrapper {
            width: 100%;
            max-width: 420px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
        }

        /* Header с балансом */
        .game-header {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .bal-box span { font-size: 12px; color: #888; display: block; text-transform: uppercase; }
        .bal-box b { font-size: 20px; color: var(--gold); }

        .mult-box { text-align: right; }
        .mult-box b { font-size: 24px; color: var(--primary); text-shadow: 0 0 10px rgba(0,242,255,0.5); }

        /* Игровое поле */
        .grid-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        .row {
            display: flex;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }

        .cell {
            width: 22%;
            aspect-ratio: 1/1;
            background: #1a1a1c;
            border: 1px solid #2a2a2c;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* Состояния ячеек */
        .cell.active-row { border-color: var(--primary); background: #1e2a2d; box-shadow: inset 0 0 10px rgba(0,242,255,0.1); }
        .cell.win { background: rgba(0, 255, 136, 0.15); border-color: var(--success); color: var(--success); }
        .cell.loss { background: rgba(255, 0, 85, 0.15); border-color: var(--danger); animation: shake 0.3s; }
        .cell.disabled { opacity: 0.3; cursor: default; }

        /* Контроллы */
        .footer-controls {
            background: var(--card);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 24px 24px 0 0;
            margin: 0 -16px -16px -16px;
        }

        .bet-input-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 15px;
        }

        input {
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            outline: none;
        }

        .main-btn {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 4px 15px rgba(112,0,255,0.3);
        }

        .cashout-btn {
            background: var(--success);
            color: #000;
            display: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Overlay */
        #msg-overlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--primary);
            z-index: 100;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="ui-wrapper">
    <div class="game-header">
        <div class="bal-box">
            <span>Ваш счёт</span>
            <b id="balance-display">0 ⭐</b>
        </div>
        <div class="mult-box">
            <span>Множитель</span>
            <b id="multiplier-display">x1.00</b>
        </div>
    </div>

    <div class="grid-container" id="grid">
        </div>

    <div class="footer-controls">
        <div class="bet-input-wrap">
            <input type="number" id="bet-field" value="10" placeholder="Ставка">
        </div>
        <button id="action-btn" class="main-btn">ИГРАТЬ</button>
        <button id="cash-btn" class="main-btn cashout-btn">ЗАБРАТЬ</button>
    </div>
</div>

<div id="msg-overlay"></div>

<script>
    // --- ИНИЦИАЛИЗАЦИЯ TG WEBAPP ---
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // --- ПАРАМЕТРЫ (3 уровня защиты) ---
    const params = new URLSearchParams(window.location.search);
    const UID = params.get('uid') || "dev_user";
    const START_BAL = parseInt(params.get('bal')) || 1000; // Fail-safe
    const TS = params.get('ts') || Date.now();
    const SIGN = params.get('sign') || "dev_sign";

    let balance = START_BAL;
    let currentBet = 0;
    let currentRow = 0;
    let isPlaying = false;
    let multiplier = 1.0;
    let bombs = [];

    const elGrid = document.getElementById('grid');
    const elBal = document.getElementById('balance-display');
    const elMult = document.getElementById('multiplier-display');
    const elBtn = document.getElementById('action-btn');
    const elCash = document.getElementById('cash-btn');
    const elInput = document.getElementById('bet-field');

    // 1. Seed-генератор бомб (Уровень 2 защиты)
    function generateLevelBombs() {
        let b = [];
        let seed = parseInt(TS.toString().slice(-6));
        for(let i=0; i<8; i++) {
            seed = (seed * 16807) % 2147483647;
            b.push(seed % 4);
        }
        return b;
    }

    // 2. Отрисовка поля
    function renderGrid() {
        elGrid.innerHTML = '';
        for(let r=7; r>=0; r--) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row';
            rowDiv.id = `row-${r}`;
            for(let c=0; c<4; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell disabled';
                cell.id = `c-${r}-${c}`;
                cell.dataset.r = r;
                cell.dataset.c = c;
                cell.addEventListener('click', () => handleStep(r, c));
                rowDiv.appendChild(cell);
            }
            elGrid.appendChild(rowDiv);
        }
    }

    function updateUI() {
        elBal.innerText = `${balance} ⭐`;
        elMult.innerText = `x${multiplier.toFixed(2)}`;
    }

    // 3. Логика хода
    function handleStep(r, c) {
        if(!isPlaying || r !== currentRow) return;

        const cell = document.getElementById(`c-${r}-${c}`);
        const bombCol = bombs[r];

        if(c === bombCol) {
            // ПРОИГРЫШ
            cell.classList.add('loss');
            cell.innerHTML = '💣';
            tg.HapticFeedback.notificationOccurred('error');
            endGame(false);
        } else {
            // УСПЕХ
            cell.classList.add('win');
            cell.innerHTML = '💎';
            tg.HapticFeedback.impactOccurred('medium');
            
            currentRow++;
            multiplier += (0.2 + (r * 0.1));
            updateUI();

            if(currentRow > 7) {
                endGame(true);
            } else {
                highlightRow(currentRow);
            }
        }
    }

    function highlightRow(idx) {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active-row'));
        document.querySelectorAll(`.cell[data-r="${idx}"]`).forEach(c => {
            c.classList.remove('disabled');
            c.classList.add('active-row');
        });
    }

    // 4. Управление игрой
    elBtn.onclick = () => {
        if(isPlaying) return;
        
        currentBet = parseInt(elInput.value);
        if(currentBet > balance || currentBet <= 0) {
            return tg.showAlert("Недостаточно средств!");
        }

        balance -= currentBet;
        isPlaying = true;
        currentRow = 0;
        multiplier = 1.0;
        bombs = generateLevelBombs();

        renderGrid();
        highlightRow(0);
        updateUI();

        elBtn.style.display = 'none';
        elCash.style.display = 'block';
        elInput.disabled = true;
    };

    elCash.onclick = () => {
        if(!isPlaying) return;
        const win = Math.floor(currentBet * multiplier);
        balance += win;
        endGame(true);
    };

    function endGame(isWin) {
        isPlaying = false;
        elCash.style.display = 'none';
        elBtn.style.display = 'block';
        elBtn.innerText = "ОБРАБОТКА...";
        elBtn.disabled = true;

        // Финальная синхронизация с защитой (Уровень 3)
        const result = {
            final_balance: balance,
            start_balance: START_BAL,
            ts: TS,
            sign: SIGN,
            is_win: isWin
        };

        setTimeout(() => {
            tg.sendData(JSON.stringify(result));
            tg.close();
        }, 800);
    }

    // Старт
    renderGrid();
    updateUI();
</script>

</body>
</html>
